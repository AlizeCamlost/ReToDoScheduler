name: deploy

on:
  workflow_dispatch:
    inputs:
      deploy_branch:
        description: Branch to deploy
        required: true
        default: main

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    steps:
      - name: Validate deploy inputs
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST != '' && secrets.DEPLOY_HOST || vars.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER != '' && secrets.DEPLOY_USER || vars.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH != '' && secrets.DEPLOY_PATH || vars.DEPLOY_PATH }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_BRANCH: ${{ github.event.inputs.deploy_branch || 'main' }}
        run: |
          missing=0

          if [ -z "$DEPLOY_HOST" ]; then
            echo "::error::Missing DEPLOY_HOST (set secret DEPLOY_HOST or repo variable DEPLOY_HOST)"
            missing=1
          fi
          if [ -z "$DEPLOY_USER" ]; then
            echo "::error::Missing DEPLOY_USER (set secret DEPLOY_USER or repo variable DEPLOY_USER)"
            missing=1
          fi
          if [ -z "$DEPLOY_PATH" ]; then
            echo "::error::Missing DEPLOY_PATH (set secret DEPLOY_PATH or repo variable DEPLOY_PATH)"
            missing=1
          fi
          if [ -z "$DEPLOY_SSH_KEY" ]; then
            echo "::error::Missing DEPLOY_SSH_KEY (set as Actions secret)"
            missing=1
          fi
          if [ -z "$DEPLOY_BRANCH" ]; then
            echo "::error::Missing deploy_branch input"
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_BRANCH: ${{ github.event.inputs.deploy_branch || 'main' }}
        with:
          host: ${{ secrets.DEPLOY_HOST != '' && secrets.DEPLOY_HOST || vars.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER != '' && secrets.DEPLOY_USER || vars.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT != '' && secrets.DEPLOY_PORT || vars.DEPLOY_PORT || '22' }}
          envs: DEPLOY_BRANCH
          script: |
            cd ${{ secrets.DEPLOY_PATH != '' && secrets.DEPLOY_PATH || vars.DEPLOY_PATH }}
            if ! git diff --quiet || ! git diff --cached --quiet; then
              echo "[deploy] Refusing to overwrite uncommitted changes in deploy checkout" >&2
              git status --short >&2
              exit 1
            fi
            git fetch origin "$DEPLOY_BRANCH"
            git checkout -B "$DEPLOY_BRANCH" "origin/$DEPLOY_BRANCH"
            bash scripts/server-auto-deploy.sh "$DEPLOY_BRANCH"
