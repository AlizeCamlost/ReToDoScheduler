version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: retodo-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - retodo_pgdata:/var/lib/postgresql/data
      - ../services/db/migrations:/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: services/api/Dockerfile
    container_name: retodo-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8787
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      API_AUTH_TOKEN: ${API_AUTH_TOKEN}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8787:8787"

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: ""
        VITE_API_AUTH_TOKEN: ${API_AUTH_TOKEN}
    container_name: retodo-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"

volumes:
  retodo_pgdata:
